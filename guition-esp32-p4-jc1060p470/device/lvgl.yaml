switch:
  - platform: homeassistant
    id: ha_office_fan
    entity_id: fan.office_ceiling_fan
    on_state:
      then:
        - lvgl.widget.update:
            id: office_ceiling_fan_switch
            state:
              checked: !lambda return x;

lvgl:
  displays: my_display
  byte_order: little_endian
  top_layer:
    widgets:
      # Temperature
      - label:
          text: '-° / -°'
          id: temperatures
          text_font: clockbar_font
          align: top_left
          x: 8
          'y': 8
          text_color: 16777215
      - label:
          text: '--:--'
          id: display_time
          text_font: clockbar_font
          align: top_mid
          x: 0
          'y': 8
          text_align: center
          text_color: 16777215
  pages:
    - id: main_page
      layout:
        type: flex
        flex_flow: column_wrap
        pad_row: 10
        pad_column: 10
      width: 100%
      bg_color: Black
      bg_opa: cover
      pad_top: 42
      pad_bottom: 5
      pad_left: 5
      pad_right: 5
      widgets:
        # Clock
        - obj:
            height: SIZE_CONTENT
            width: 240
            align: CENTER
            pad_all: 0
            border_width: 0
            bg_color: 16777215
            widgets:
              - meter:
                  height: 220
                  width: 220
                  align: CENTER
                  bg_opa: TRANSP
                  border_width: 0
                  text_color: 0
                  scales:
                    - range_from: 0
                      range_to: 60
                      angle_range: 360
                      rotation: 270
                      ticks:
                        width: 1
                        count: 61
                        length: 10
                        color: 0
                      indicators:
                        - line:
                            id: minute_hand
                            width: 3
                            color: 10921638
                            r_mod: -4
                            value: 0
                    - range_from: 1
                      range_to: 12
                      angle_range: 330
                      rotation: 300
                      ticks:
                        width: 1
                        count: 12
                        length: 1
                        major:
                          stride: 1
                          width: 4
                          length: 10
                          color: 12632256
                          label_gap: 12
                    - range_from: 0
                      range_to: 720
                      angle_range: 360
                      rotation: 270
                      ticks:
                        count: 0
                      indicators:
                        - line:
                            id: hour_hand
                            width: 5
                            color: 10921638
                            r_mod: -30
                            value: 0
              - label:
                  styles: date_style
                  id: day_label
                  'y': -30
              - label:
                  id: date_label
                  styles: date_style
                  'y': 30
        
        # Office Ceiling Fan Light
        - switch:
            align: CENTER
            id: office_ceiling_fan_switch
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  id: office_ceiling_fan_icon
                  text: $ceiling_fan
              - label:
                  align: bottom_left
                  id: office_ceiling_fan_label
                  text: Ceiling Fan
            on_value:
              then:
                - if:
                    condition:
                      lambda: return x;
                    then:
                      - switch.turn_on: ha_office_fan
                    else:
                      - switch.turn_off: ha_office_fan
