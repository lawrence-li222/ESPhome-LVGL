switch:
  - platform: homeassistant
    id: ha_office_fan
    entity_id: fan.office_ceiling_fan
    on_state:
      then:
        - lvgl.widget.update:
            id: office_ceiling_fan_switch
            state:
              checked: !lambda return x;

lvgl:
  displays: my_display
  byte_order: little_endian
  on_touch:
    then:
      - lambda: |-
          id(last_activity) = millis();
      - light.turn_on:
          id: backlight
          brightness: 100%
  interval:
  - interval: 10s
    then:
      - lambda: |-
          if (millis() - id(last_activity) > 120000) {
            auto call = id(backlight).turn_on();
            call.set_brightness(0.05);
            call.perform();
          }
  top_layer:
    widgets:
      # Temperature
      - label:
          text: "-° / -°"
          id: temperatures
          text_font: clockbar_font
          align: top_left
          x: 8
          y: 8
          text_color: 0xFFFFFF
      # Room Name
      - label:
          text: "Office"
          id: room_name
          text_font: montserrat_26
          align: top_mid
          x: 0
          y: 8
          text_color: 0xFFFFFF
      # Clock
      - label:
          text: "--:--"
          id: display_time
          text_font: clockbar_font
          align: top_right
          x: 0
          y: 8
          text_align: center
          text_color: 0xFFFFFF
          
  pages:
    - id: office_page
      layout: 
        type: flex
        flex_flow: column_wrap
        pad_row: 10
        pad_column: 10
      width: 100%
      bg_color: Black
      bg_opa: cover
      pad_top: 42
      pad_bottom: 5
      pad_left: 5
      pad_right: 5
      
      widgets:
      
        # Office Ceiling Fan Light
        - button: 
            height: $button_height
            width: $button_width
            checkable: true
            id: office_ceiling_fan_switch
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  id: office_ceiling_fan_icon                
                  text: $ceiling_fan
              - label:
                  align: bottom_left
                  id: office_ceiling_fan_label
                  text: "Office Ceiling Fan"
            on_value:
              then:
                - if:
                    condition:
                      lambda: return x;
                    then:
                      - switch.turn_on: ha_office_fan
                    else:
                      - switch.turn_off: ha_office_fan
           
