sensor:
 # Fan speed % (0–100) reported by HA
  - platform: homeassistant
    id: ha_fan_speed
    entity_id: fan.office_ceiling_fan       # ← your HA fan entity_id
    attribute: percentage                   # HA fan attribute
    on_value:
      then:
        - lvgl.slider.update:
            id: fan_slider
            value: !lambda "return x;"
        - lvgl.label.update:
            id: speed_label
            text: !lambda |-
              return std::to_string((int)x) + "%";

binary_sensor:
  # Fan on/off state reported by HA
  - platform: homeassistant
    id: ha_fan_state
    entity_id: fan.office_ceiling_fan          # ← same entity_id
    on_state:
      then:
        - if:
            condition:
              binary_sensor.is_on: ha_fan_state
            then:
              - lvgl.widget.update:
                  id: status_dot
                  style_props:
                    bg_color: 0x00BFFF      # blue = ON
              - lvgl.label.update:
                  id: status_label
                  text: "ON"
            else:
              - lvgl.widget.update:
                  id: status_dot
                  style_props:
                    bg_color: 0x444444      # grey = OFF
              - lvgl.label.update:
                  id: status_label
                  text: "OFF"
